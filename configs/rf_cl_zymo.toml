[caller_settings.dorado]
config = "dna_r10.4.1_e8.2_400bps_fast@v5.2.0||"
address = "ipc:///var/lib/minknow/data/.dorado/dorado-basecall-server.sock"
# address = "127.0.0.1:5555"

[mapper_settings.pycollinearity]
# Update the following path
input = "/scratch/NASExperiments/tmp/Zymo.cidx" 
n_threads = 16

[[regions]]
name = "analysis"
min_chunks = 1
max_chunks = 2
targets = []
single_on  = "stop_receiving"   # mapped to target → keep
multi_on   = "stop_receiving"   # mapped to multiple targets → keep
single_off = "unblock"          # mapped off-target → eject  (was stop_receiving — BUG)
multi_off  = "unblock"          # mapped off-target → eject  (was stop_receiving — BUG)
no_seq     = "proceed"          # not yet basecalled → wait for next chunk
no_map     = "unblock"          # no alignment → eject (not in Community 1 index)
