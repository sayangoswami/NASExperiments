[caller_settings.dorado]
config = "dna_r10.4.1_e8.2_400bps_fast@v5.2.0||"
address = "ipc:///var/lib/minknow/data/.dorado/dorado-basecall-server.sock"

[mapper_settings.pyreadbouncer]
# Update the following path
target_files = "/scratch/NASExperiments/tmp/Refs1.ibf" 
threads = 16

[[regions]]
name = "analysis"
min_chunks = 1
max_chunks = 2
targets = []
single_on = "stop_receiving"
multi_on =  "stop_receiving"
single_off = "stop_receiving"
multi_off = "stop_receiving"
no_seq = "proceed"
no_map = "unblock"
